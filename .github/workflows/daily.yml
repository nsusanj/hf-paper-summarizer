name: Daily Papers

on:
  workflow_dispatch:  # manual runs only — daily automation handled by local launchd cron

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write system prompt
        run: |
          mkdir -p prompts
          printf '%s' "$SYSTEM_PROMPT" > prompts/system.txt
        env:
          SYSTEM_PROMPT: ${{ secrets.SYSTEM_PROMPT }}

      - name: Generate daily post
        run: python -m src.main
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SUBSTACK_COOKIES: ${{ secrets.SUBSTACK_COOKIES }}

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/
          git diff --cached --quiet || git commit -m "Daily papers post: $(date -u +%Y-%m-%d) [skip ci]"
          git push
